<div class="container mx-auto px-4 py-8">
  <div class="bg-white rounded-lg shadow-lg overflow-hidden">
    <!-- Header -->
    <div class="bg-teal-600 text-white px-6 py-4">
      <div class="flex justify-between items-center">
        <h2 class="text-2xl font-bold">Gestion des Enseignants</h2>
        <button (click)="add()" class="bg-white text-teal-600 px-4 py-2 rounded font-semibold hover:bg-gray-100">
          + Ajouter
        </button>
      </div>
    </div>

    <!-- Error Message -->
    <div *ngIf="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 m-4 rounded">
      {{ error }}
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="text-center py-8">
      <p>Chargement...</p>
    </div>

    <!-- Table -->
    <div *ngIf="!loading && teachers.length > 0" class="overflow-x-auto">
      <table class="w-full border-collapse">
        <thead class="bg-gray-200">
          <tr>
            <th class="border px-4 py-2 text-left">Prénom</th>
            <th class="border px-4 py-2 text-left">Nom</th>
            <th class="border px-4 py-2 text-left">Email</th>
            <th class="border px-4 py-2 text-left">Téléphone</th>
            <th class="border px-4 py-2 text-left">Spécialité</th>
            <th class="border px-4 py-2 text-center">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let teacher of teachers" class="hover:bg-gray-50">
            <td class="border px-4 py-2">{{ teacher.firstName }}</td>
            <td class="border px-4 py-2">{{ teacher.surname }}</td>
            <td class="border px-4 py-2">{{ teacher.email }}</td>
            <td class="border px-4 py-2">{{ teacher.telephone }}</td>
            <td class="border px-4 py-2">{{ teacher.specialization }}</td>
            <td class="border px-4 py-2 text-center">
              <button (click)="edit(teacher.id)" class="text-blue-600 hover:text-blue-800 mr-2 font-semibold">
                ✏️ Modifier
              </button>
              <button (click)="delete(teacher.id)" class="text-red-600 hover:text-red-800 font-semibold">
                🗑️ Supprimer
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && teachers.length === 0" class="text-center py-8">
      <p class="text-gray-600 mb-4">Aucun enseignant trouvé</p>
      <button (click)="add()" class="bg-teal-600 text-white px-6 py-2 rounded hover:bg-teal-700">
        + Ajouter un enseignant
      </button>
    </div>
  </div>
</div>
