<div class="min-h-screen bg-gray-50 dark:bg-gray-900 p-6">
  <div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold text-gray-900 dark:text-white">🧩 Intervenants spécialisés</h1>
      <button (click)="toggleForm()" [ngClass]="showForm ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'" class="text-white font-semibold py-2 px-6 rounded-lg">
        {{ showForm ? 'Annuler' : '+ Ajouter Intervenant' }}
      </button>
    </div>

    <div *ngIf="success" class="mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg">{{ success }}</div>
    <div *ngIf="error" class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg">{{ error }}</div>

    <div *ngIf="showForm" class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-8 mb-8">
      <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">Ajouter un nouvel intervenant</h2>
      <form [formGroup]="teacherForm" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Prénom</label>
          <input type="text" formControlName="firstName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="Prénom">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Nom</label>
          <input type="text" formControlName="lastName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="Nom">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Email</label>
          <input type="email" formControlName="email" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="email@tsa.com">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Téléphone</label>
          <input type="tel" formControlName="phoneNumber" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="+216 20 000 000">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Spécialisation</label>
          <input type="text" formControlName="specialization" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="Ergothérapeute, Psychologue, etc.">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Qualification</label>
          <input type="text" formControlName="qualification" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="Master, Licence, etc.">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Expérience (années)</label>
          <input type="number" formControlName="experience" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="5">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Disponibilité</label>
          <input type="text" formControlName="availability" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="Lundi, Mercredi, etc.">
        </div>

        <div class="md:col-span-2">
          <button type="submit" [disabled]="teacherForm.invalid || isLoading" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-semibold py-2 px-4 rounded-lg">
            {{ isLoading ? 'Création en cours...' : 'Créer l\'intervenant' }}
          </button>
        </div>
      </form>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-200 dark:bg-gray-700">
          <tr>
            <th class="px-6 py-3 text-left text-sm font-semibold">Nom</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Email</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Spécialisation</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Expérience</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
          <tr *ngFor="let teacher of teachers" class="hover:bg-gray-50 dark:hover:bg-gray-700">
            <td class="px-6 py-4">{{ teacher.firstName }} {{ teacher.lastName }}</td>
            <td class="px-6 py-4">{{ teacher.email }}</td>
            <td class="px-6 py-4">{{ teacher.specialization }}</td>
            <td class="px-6 py-4">{{ teacher.experience }} ans</td>
            <td class="px-6 py-4">
              <button (click)="deleteTeacher(teacher.id!)" class="text-red-600 hover:text-red-800 font-semibold">Supprimer</button>
            </td>
          </tr>
          <tr *ngIf="teachers.length === 0">
            <td colspan="5" class="px-6 py-8 text-center text-gray-500">Aucun intervenant trouvé.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
