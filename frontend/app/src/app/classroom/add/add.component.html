<div class="container mx-auto px-4 py-8">
  <div class="max-w-4xl mx-auto bg-white shadow-lg rounded-lg overflow-hidden">
    <div class="bg-gradient-to-r from-blue-600 to-blue-700 px-6 py-4">
      <div class="flex items-center justify-between">
        <h1 class="text-2xl font-bold text-white">Add New Classroom</h1>
        <button (click)="goBack()" class="text-white hover:text-gray-200">
          <svg class="w-6 h-6" fill="none" stroke="currentColor" viewBox="0 0 24 24">
            <path stroke-linecap="round" stroke-linejoin="round" stroke-width="2" d="M6 18L18 6M6 6l12 12" />
          </svg>
        </button>
      </div>
    </div>

    <!-- Error Message -->
    <div *ngIf="showError" class="bg-red-50 border border-red-200 text-red-800 px-6 py-4">
      {{ errorMessage }}
    </div>

    <form [formGroup]="classroomForm" (ngSubmit)="onSubmit()" class="p-6 space-y-6">
      <div class="grid grid-cols-1 md:grid-cols-2 gap-6">

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Name <span class="text-red-500">*</span></label>
          <input formControlName="name" type="text"
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                 [class.border-red-500]="f['name']?.invalid && f['name']?.touched" />
          <div *ngIf="f['name']?.invalid && f['name']?.touched" class="text-sm text-red-600 mt-1">
            Name is required
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Capacity <span class="text-red-500">*</span></label>
          <input formControlName="capacity" type="number"
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                 [class.border-red-500]="f['capacity']?.invalid && f['capacity']?.touched" />
          <div *ngIf="f['capacity']?.invalid && f['capacity']?.touched" class="text-sm text-red-600 mt-1">
            Capacity must be at least 1
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Grade <span class="text-red-500">*</span></label>
          <input formControlName="grade" type="text"
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                 [class.border-red-500]="f['grade']?.invalid && f['grade']?.touched" />
          <div *ngIf="f['grade']?.invalid && f['grade']?.touched" class="text-sm text-red-600 mt-1">
            Grade is required
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Academic Year <span class="text-red-500">*</span></label>
          <input formControlName="academicYear" type="text"
                 placeholder="2024/2025"
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                 [class.border-red-500]="f['academicYear']?.invalid && f['academicYear']?.touched" />
          <div *ngIf="f['academicYear']?.invalid && f['academicYear']?.touched" class="text-sm text-red-600 mt-1">
            Academic Year is required
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Specialization <span class="text-red-500">*</span></label>
          <input formControlName="Specialization" type="text"
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                 [class.border-red-500]="f['Specialization']?.invalid && f['Specialization']?.touched" />
          <div *ngIf="f['Specialization']?.invalid && f['Specialization']?.touched" class="text-sm text-red-600 mt-1">
            Specialization is required
          </div>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 mb-2">Location <span class="text-red-500">*</span></label>
          <input formControlName="location" type="text"
                 class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"
                 [class.border-red-500]="f['location']?.invalid && f['location']?.touched" />
          <div *ngIf="f['location']?.invalid && f['location']?.touched" class="text-sm text-red-600 mt-1">
            Location is required
          </div>
        </div>

        <div class="col-span-2">
          <label class="block text-sm font-medium text-gray-700 mb-2">Description</label>
          <textarea formControlName="description" rows="3"
                    class="w-full px-4 py-2 border rounded-lg focus:ring-2 focus:ring-blue-500"></textarea>
        </div>

        <div class="flex items-center">
          <input formControlName="isActive" type="checkbox" class="mr-2" />
          <label class="text-sm font-medium text-gray-700">Is Active</label>
        </div>

        <div class="col-span-2 flex justify-end space-x-4">
          <button type="button" (click)="goBack()"
                  class="px-6 py-2 border border-gray-300 rounded-lg hover:bg-gray-50">
            Cancel
          </button>
          <button type="submit" [disabled]="loading"
                  class="px-6 py-2 bg-blue-600 text-white rounded-lg hover:bg-blue-700 disabled:bg-gray-400 disabled:cursor-not-allowed flex items-center">
            <span *ngIf="!loading">Save Classroom</span>
            <span *ngIf="loading" class="flex items-center">
              <svg class="animate-spin -ml-1 mr-2 h-5 w-5 text-white" xmlns="http://www.w3.org/2000/svg" fill="none" viewBox="0 0 24 24">
                <circle class="opacity-25" cx="12" cy="12" r="10" stroke="currentColor" stroke-width="4"></circle>
                <path class="opacity-75" fill="currentColor" d="M4 12a8 8 0 018-8V0C5.373 0 0 5.373 0 12h4zm2 5.291A7.962 7.962 0 014 12H0c0 3.042 1.135 5.824 3 7.938l3-2.647z"></path>
              </svg>
              Creating...
            </span>
          </button>
        </div>
      </div>
    </form>
  </div>
</div>
