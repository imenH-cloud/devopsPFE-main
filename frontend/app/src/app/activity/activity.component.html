<div class="min-h-screen bg-gray-50 dark:bg-gray-900 p-6">
  <div class="max-w-6xl mx-auto">
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold text-gray-900 dark:text-white">📊 Activités & Suivi</h1>
      <button (click)="toggleForm()" [ngClass]="showForm ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'" class="text-white font-semibold py-2 px-6 rounded-lg">
        {{ showForm ? 'Annuler' : '+ Ajouter Activité' }}
      </button>
    </div>

    <div *ngIf="success" class="mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg">{{ success }}</div>
    <div *ngIf="error" class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg">{{ error }}</div>

    <div *ngIf="showForm" class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-8 mb-8">
      <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">Ajouter une nouvelle activité</h2>
      <form [formGroup]="activityForm" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Titre</label>
          <input type="text" formControlName="title" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="Titre de l'activité">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Type</label>
          <input type="text" formControlName="type" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="Thérapie, Jeu, etc.">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">ID Enfant</label>
          <input type="number" formControlName="studentId" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="ID">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Date</label>
          <input type="date" formControlName="date" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Durée (minutes)</label>
          <input type="number" formControlName="duration" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="30">
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Description</label>
          <textarea formControlName="description" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="Description" rows="3"></textarea>
        </div>

        <div class="md:col-span-2">
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Notes</label>
          <textarea formControlName="notes" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="Notes supplémentaires" rows="2"></textarea>
        </div>

        <div class="md:col-span-2">
          <button type="submit" [disabled]="activityForm.invalid || isLoading" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-semibold py-2 px-4 rounded-lg">
            {{ isLoading ? 'Création en cours...' : 'Créer l\'activité' }}
          </button>
        </div>
      </form>
    </div>

    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-200 dark:bg-gray-700">
          <tr>
            <th class="px-6 py-3 text-left text-sm font-semibold">Titre</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Type</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Date</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Durée</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
          <tr *ngFor="let activity of activities" class="hover:bg-gray-50 dark:hover:bg-gray-700">
            <td class="px-6 py-4">{{ activity.title }}</td>
            <td class="px-6 py-4">{{ activity.type }}</td>
            <td class="px-6 py-4">{{ activity.date }}</td>
            <td class="px-6 py-4">{{ activity.duration }} min</td>
            <td class="px-6 py-4">
              <button (click)="deleteActivity(activity.id!)" class="text-red-600 hover:text-red-800 font-semibold">Supprimer</button>
            </td>
          </tr>
          <tr *ngIf="activities.length === 0">
            <td colspan="5" class="px-6 py-8 text-center text-gray-500">Aucune activité trouvée.</td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
