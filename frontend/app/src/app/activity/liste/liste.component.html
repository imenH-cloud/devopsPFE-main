<div class="container mx-auto px-4 py-8">
  <div class="bg-white rounded-lg shadow-lg overflow-hidden">
    <!-- Header -->
    <div class="bg-orange-500 text-white px-6 py-4">
      <div class="flex justify-between items-center">
        <h2 class="text-2xl font-bold">Gestion des Activités</h2>
        <button (click)="add()" class="bg-white text-orange-500 px-4 py-2 rounded font-semibold hover:bg-gray-100">
          + Ajouter
        </button>
      </div>
    </div>

    <!-- Error Message -->
    <div *ngIf="error" class="bg-red-100 border border-red-400 text-red-700 px-4 py-3 m-4 rounded">
      {{ error }}
    </div>

    <!-- Loading -->
    <div *ngIf="loading" class="text-center py-8">
      <p>Chargement...</p>
    </div>

    <!-- Table -->
    <div *ngIf="!loading && activities.length > 0" class="overflow-x-auto">
      <table class="w-full border-collapse">
        <thead class="bg-gray-200">
          <tr>
            <th class="border px-4 py-2 text-left">Activité</th>
            <th class="border px-4 py-2 text-left">Type</th>
            <th class="border px-4 py-2 text-left">Description</th>
            <th class="border px-4 py-2 text-left">Localisation</th>
            <th class="border px-4 py-2 text-left">Durée (min)</th>
            <th class="border px-4 py-2 text-center">Actions</th>
          </tr>
        </thead>
        <tbody>
          <tr *ngFor="let activity of activities" class="hover:bg-gray-50">
            <td class="border px-4 py-2">{{ activity.name }}</td>
            <td class="border px-4 py-2">{{ activity.type }}</td>
            <td class="border px-4 py-2 truncate">{{ activity.description }}</td>
            <td class="border px-4 py-2">{{ activity.location || '-' }}</td>
            <td class="border px-4 py-2">{{ activity.duration }}</td>
            <td class="border px-4 py-2 text-center">
              <button (click)="edit(activity.id)" class="text-blue-600 hover:text-blue-800 mr-2 font-semibold">
                ✏️ Modifier
              </button>
              <button (click)="delete(activity.id)" class="text-red-600 hover:text-red-800 font-semibold">
                🗑️ Supprimer
              </button>
            </td>
          </tr>
        </tbody>
      </table>
    </div>

    <!-- Empty State -->
    <div *ngIf="!loading && activities.length === 0" class="text-center py-8">
      <p class="text-gray-600 mb-4">Aucune activité trouvée</p>
      <button (click)="add()" class="bg-orange-500 text-white px-6 py-2 rounded hover:bg-orange-600">
        + Ajouter une activité
      </button>
    </div>
  </div>
</div>
