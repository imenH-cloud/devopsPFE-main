<div class="min-h-screen bg-gray-50 dark:bg-gray-900 p-6">
  <div class="max-w-6xl mx-auto">
    
    <!-- Header -->
    <div class="flex justify-between items-center mb-8">
      <h1 class="text-4xl font-bold text-gray-900 dark:text-white">👧 Enfants autistes</h1>
      <button 
        (click)="toggleForm()"
        [ngClass]="showForm ? 'bg-red-600 hover:bg-red-700' : 'bg-blue-600 hover:bg-blue-700'"
        class="text-white font-semibold py-2 px-6 rounded-lg transition-all">
        {{ showForm ? 'Annuler' : '+ Ajouter Enfant' }}
      </button>
    </div>

    <!-- Messages -->
    <div *ngIf="success" class="mb-4 p-4 bg-green-100 border border-green-400 text-green-700 rounded-lg">
      {{ success }}
    </div>
    <div *ngIf="error" class="mb-4 p-4 bg-red-100 border border-red-400 text-red-700 rounded-lg">
      {{ error }}
    </div>

    <!-- Add Form -->
    <div *ngIf="showForm" class="bg-white dark:bg-gray-800 rounded-lg shadow-lg p-8 mb-8">
      <h2 class="text-2xl font-bold text-gray-900 dark:text-white mb-6">Ajouter un nouvel enfant</h2>
      
      <form [formGroup]="studentForm" (ngSubmit)="onSubmit()" class="grid grid-cols-1 md:grid-cols-2 gap-6">
        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Prénom</label>
          <input type="text" formControlName="firstName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="Prénom">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Nom</label>
          <input type="text" formControlName="lastName" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="Nom">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Date de naissance</label>
          <input type="date" formControlName="dateOfBirth" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Genre</label>
          <select formControlName="gender" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white">
            <option value="">Sélectionner</option>
            <option value="M">Masculin</option>
            <option value="F">Féminin</option>
          </select>
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">ID Parent</label>
          <input type="number" formControlName="parentId" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="ID">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">ID Classe</label>
          <input type="number" formControlName="classroomId" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="ID">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Type de diagnostic</label>
          <input type="text" formControlName="diagnosisType" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="TSA, ADHD, etc.">
        </div>

        <div>
          <label class="block text-sm font-medium text-gray-700 dark:text-gray-300 mb-2">Notes</label>
          <input type="text" formControlName="notes" class="w-full px-4 py-2 border border-gray-300 rounded-lg focus:ring-2 focus:ring-blue-500 dark:bg-gray-700 dark:border-gray-600 dark:text-white" placeholder="Notes">
        </div>

        <div class="md:col-span-2">
          <button type="submit" [disabled]="studentForm.invalid || isLoading" class="w-full bg-blue-600 hover:bg-blue-700 disabled:bg-gray-400 text-white font-semibold py-2 px-4 rounded-lg transition-all">
            {{ isLoading ? 'Création en cours...' : 'Créer l\'enfant' }}
          </button>
        </div>
      </form>
    </div>

    <!-- Students List -->
    <div class="bg-white dark:bg-gray-800 rounded-lg shadow-lg overflow-hidden">
      <table class="w-full">
        <thead class="bg-gray-200 dark:bg-gray-700">
          <tr>
            <th class="px-6 py-3 text-left text-sm font-semibold">Nom</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Date de naissance</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Diagnostic</th>
            <th class="px-6 py-3 text-left text-sm font-semibold">Actions</th>
          </tr>
        </thead>
        <tbody class="divide-y divide-gray-200 dark:divide-gray-700">
          <tr *ngFor="let student of students" class="hover:bg-gray-50 dark:hover:bg-gray-700">
            <td class="px-6 py-4">{{ student.firstName }} {{ student.lastName }}</td>
            <td class="px-6 py-4">{{ student.dateOfBirth }}</td>
            <td class="px-6 py-4">{{ student.diagnosisType }}</td>
            <td class="px-6 py-4">
              <button (click)="deleteStudent(student.id!)" class="text-red-600 hover:text-red-800 font-semibold">
                Supprimer
              </button>
            </td>
          </tr>
          <tr *ngIf="students.length === 0">
            <td colspan="4" class="px-6 py-8 text-center text-gray-500">
              Aucun enfant trouvé.
            </td>
          </tr>
        </tbody>
      </table>
    </div>
  </div>
</div>
