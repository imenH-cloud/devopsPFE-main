apiVersion: apps/v1
kind: Deployment
metadata:
  name: activity-service-deployment
  namespace: education
spec:
  replicas: 1
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  selector:
    matchLabels:
      app: activity-service
  template:
    metadata:
      labels:
        app: activity-service
    spec:
      # Init containers - setup before main container
      initContainers:
      - name: db-init
        image: eline2016/devopspfe-activity-service:58
        command: ['npm', 'run', 'migration:run']
        env:
        - name: DB_HOST
          value: "postgres-deployment"
        - name: DB_PORT
          value: "5432"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        - name: DB_NAME
          value: "education"

      containers:
      - name: activity-service
        image: eline2016/devopspfe-activity-service:58
        imagePullPolicy: IfNotPresent
        ports:
        - containerPort: 3003
          name: http
        
        env:
        - name: NODE_ENV
          value: "production"
        - name: DB_HOST
          value: "postgres-deployment"
        - name: DB_PORT
          value: "5432"
        - name: DB_USERNAME
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: username
        - name: DB_PASSWORD
          valueFrom:
            secretKeyRef:
              name: postgres-secret
              key: password
        - name: DB_NAME
          value: "education"
        - name: ELASTICSEARCH_URL
          value: "http://elasticsearch:9200"

        resources:
          requests:
            memory: "256Mi"
            cpu: "100m"
          limits:
            memory: "512Mi"
            cpu: "500m"

        # Liveness probe - restart if unhealthy
        livenessProbe:
          httpGet:
            path: /health
            port: 3003
            scheme: HTTP
          initialDelaySeconds: 45
          periodSeconds: 15
          timeoutSeconds: 5
          failureThreshold: 3

        # Readiness probe - remove from load balancer if not ready
        readinessProbe:
          httpGet:
            path: /health/ready
            port: 3003
            scheme: HTTP
          initialDelaySeconds: 30
          periodSeconds: 10
          timeoutSeconds: 5
          failureThreshold: 3

        # Startup probe - wait for app to start
        startupProbe:
          httpGet:
            path: /health
            port: 3003
            scheme: HTTP
          initialDelaySeconds: 0
          periodSeconds: 5
          timeoutSeconds: 3
          failureThreshold: 30  # 30 * 5 = 150 seconds max startup

---
apiVersion: v1
kind: Service
metadata:
  name: activity-service
  namespace: education
spec:
  type: ClusterIP
  selector:
    app: activity-service
  ports:
  - protocol: TCP
    port: 3003
    targetPort: 3003
    name: http

---
apiVersion: v1
kind: Service
metadata:
  name: activity-service-nodeport
  namespace: education
spec:
  type: NodePort
  selector:
    app: activity-service
  ports:
  - protocol: TCP
    port: 3003
    targetPort: 3003
    nodePort: 31003
    name: http
