apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-parent-schema
  namespace: education
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: default
      containers:
      - name: migrate
        image: postgres:15-alpine
        env:
        - name: PGPASSWORD
          value: password123
        command:
        - /bin/sh
        - -c
        - |
          psql -h postgres -U education -d education_db -c "
          CREATE TABLE IF NOT EXISTS parent (
            id SERIAL PRIMARY KEY,
            userId INTEGER,
            phoneNumber VARCHAR(20),
            address VARCHAR(255),
            NCIN VARCHAR(20),
            typeInsurance VARCHAR(50),
            Numeroinsurance VARCHAR(50),
            job VARCHAR(100),
            createdAt TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );"
      restartPolicy: Never
