apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-classroom-schema
  namespace: education
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: default
      containers:
      - name: migrate
        image: postgres:15-alpine
        env:
        - name: PGPASSWORD
          value: password123
        command:
        - /bin/sh
        - -c
        - |
          psql -h postgres -U education -d education_db -c "
          CREATE TABLE IF NOT EXISTS classroom (
            id SERIAL PRIMARY KEY,
            name VARCHAR(255) NOT NULL,
            description VARCHAR(500),
            createdAt TIMESTAMP DEFAULT CURRENT_TIMESTAMP
          );"
      restartPolicy: Never
