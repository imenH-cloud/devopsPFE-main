apiVersion: v1
kind: ConfigMap
metadata:
  name: app-config
data:
  NODE_ENV: production
  LOG_LEVEL: info
  LOG_FORMAT: json
  API_PREFIX: /api
  CORS_ORIGIN: "*"
  CORS_CREDENTIALS: "true"
  CORS_MAX_AGE: "3600"
  RATE_LIMIT_WINDOW_MS: "900000"
  RATE_LIMIT_MAX_REQUESTS: "100"
  SESSION_TIMEOUT: "3600"
  DEFAULT_PAGE_SIZE: "20"
  MAX_PAGE_SIZE: "100"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: database-config
data:
  DB_HOST: postgres
  DB_PORT: "5432"
  DB_NAME: education
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: cache-config
data:
  REDIS_HOST: redis
  REDIS_PORT: "6379"
  REDIS_DB: "0"
  REDIS_TTL: "3600"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: messaging-config
data:
  RABBITMQ_HOST: rabbitmq
  RABBITMQ_PORT: "5672"
  RABBITMQ_MANAGEMENT_PORT: "15672"
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: elasticsearch-config
data:
  ELASTICSEARCH_HOST: elasticsearch
  ELASTICSEARCH_PORT: "9200"
  ELASTICSEARCH_URL: http://elasticsearch:9200
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: minio-config
data:
  MINIO_HOST: minio
  MINIO_PORT: "9000"
  MINIO_CONSOLE_PORT: "9001"
  MINIO_ENDPOINT: minio:9000
  MINIO_USE_SSL: "false"
  MINIO_BUCKET: education
---
apiVersion: v1
kind: ConfigMap
metadata:
  name: monitoring-config
data:
  PROMETHEUS_HOST: prometheus
  PROMETHEUS_PORT: "9090"
  PROMETHEUS_URL: http://prometheus:9090
  GRAFANA_HOST: grafana
  GRAFANA_PORT: "3000"
  GRAFANA_URL: http://grafana:3000
