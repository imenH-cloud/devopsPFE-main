// =====================================================
// MONITORING/PROMETHEUS-DEPLOYMENT.YAML - Prometheus Monitoring
// =====================================================
// Déploie Prometheus (collecteur de metrics) avec configuration et stockage

// ===== 1. DEPLOYMENT - Déploiement Prometheus =====
apiVersion: apps/v1                         // Version API
kind: Deployment                            // Type : Deployment
metadata:                                   // Métadonnées
  name: prometheus-deployment               // Nom du déploiement
  labels:                                   // Labels
    app: prometheus
    
spec:                                       // Spécification
  replicas: 1                               // 1 seule instance (singleton)
  
  selector:                                 // Sélecteur
    matchLabels:
      app: prometheus
      
  template:                                 // Template de pod
    metadata:                               // Métadonnées du pod
      labels:                               // Labels
        app: prometheus
        
    spec:                                   // Spécification du pod
      serviceAccountName: prometheus-service-account  // Compte de service pour les permissions
      
      containers:                           // Conteneurs
        - name: prometheus                  // Nom du conteneur
          image: prom/prometheus:v2.37.0    // Image Prometheus version 2.37.0
          
          args:                             // Arguments au conteneur
            - "--config.file=/etc/prometheus/prometheus.yml"      // Fichier de configuration
            - "--storage.tsdb.path=/prometheus"                   // Répertoire de stockage
            
          ports:                            // Ports exposés
            - containerPort: 9090           // Port Prometheus (API + UI)
            
          volumeMounts:                     // Montage des volumes
            - name: prometheus-config-volume         // Volume de configuration
              mountPath: /etc/prometheus/            // Point de montage
              
            - name: prometheus-storage-volume       // Volume de stockage
              mountPath: /prometheus                 // Point de montage
              
      volumes:                              // Définition des volumes
        - name: prometheus-config-volume    // Volume de configuration
          configMap:                        // Utilise un ConfigMap
            name: prometheus-config         // Référence au ConfigMap
            
        - name: prometheus-storage-volume   // Volume de stockage
          emptyDir: {}                      // emptyDir : perte des données à chaque redémarrage
          // Note: En production, utiliser un PersistentVolume pour garder l'historique

---

// ===== 2. SERVICE - Point d'accès réseau =====
apiVersion: v1                              // Version API
kind: Service                               // Type : Service
metadata:                                   // Métadonnées
  name: prometheus-service                  // Nom du service (DNS: prometheus-service)
  labels:                                   // Labels
    app: prometheus
    
spec:                                       // Spécification
  selector:                                 // Sélectionne les pods
    app: prometheus
    
  ports:                                    // Ports
    - protocol: TCP
      port: 9090                            // Port du service (DNS)
      targetPort: 9090                      // Port du pod
      
  type: ClusterIP                           // Type : IP interne

// Effet: prometheus-service:9090 → pod:9090 (API + UI Prometheus)

---

// ===== 3. SERVICEACCOUNT - Identité pour les permissions =====
apiVersion: v1                              // Version API
kind: ServiceAccount                        // Type : ServiceAccount
metadata:                                   // Métadonnées
  name: prometheus-service-account          // Nom du ServiceAccount
  
// Cet account est utilisé par Prometheus pour accéder à l'API Kubernetes

---

// ===== 4. CLUSTERROLE - Permissions pour Prometheus =====
apiVersion: rbac.authorization.k8s.io/v1   // Version API RBAC
kind: ClusterRole                           // Type : rôle au niveau cluster
metadata:                                   // Métadonnées
  name: prometheus-cluster-role             // Nom du rôle
  
rules:                                      // Liste des permissions

  // Groupe 1 : Permissions sur les ressources de base
  - apiGroups: [""]                         // Groupe API : "" = API core
    resources: ["nodes", "nodes/proxy", "services", "endpoints", "pods"]  // Ressources
    verbs: ["get", "list", "watch"]         // Actions : consulter, lister, regarder
    // Permet à Prometheus de découvrir les pods et endpoints pour scraper les metrics
    
  // Groupe 2 : Permissions sur les Ingress
  - apiGroups: ["extensions"]               // Groupe API : extensions
    resources: ["ingresses"]                // Ressources : Ingress
    verbs: ["get", "list", "watch"]         // Actions
    // Permet de monitorer les règles d'Ingress
    
  // Groupe 3 : Permissions sur les ConfigMaps
  - apiGroups: [""]                         // Groupe API : core
    resources: ["configmaps"]               // Ressources : ConfigMaps
    verbs: ["get"]                          // Actions : consulter seulement

---

// ===== 5. CLUSTERROLEBINDING - Attache le rôle au ServiceAccount =====
apiVersion: rbac.authorization.k8s.io/v1   // Version API RBAC
kind: ClusterRoleBinding                    // Type : lie un rôle à un account
metadata:                                   // Métadonnées
  name: prometheus-cluster-role-binding     // Nom du binding
  
subjects:                                   // Entités qui reçoivent le rôle
  - kind: ServiceAccount                    // Type : ServiceAccount
    name: prometheus-service-account        // Nom du ServiceAccount
    namespace: default                      // Namespace : default
    
roleRef:                                    // Référence au rôle
  kind: ClusterRole                         // Type : ClusterRole
  name: prometheus-cluster-role             // Nom du rôle
  apiGroup: rbac.authorization.k8s.io       // Groupe API

// Effet: Le ServiceAccount prometheus-service-account a les permissions du rôle prometheus-cluster-role
