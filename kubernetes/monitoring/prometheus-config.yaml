
apiVersion: v1
kind: ConfigMap
metadata:
  name: prometheus-config
  labels:
    app: prometheus
spec:
  data:
    prometheus.yml: |
      global:
        scrape_interval: 15s
      scrape_configs:
        - job_name: 'kubernetes-nodes'
          kubernetes_sd_configs:
            - role: node
          relabel_configs:
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)
            - target_label: __address__
              replacement: kubernetes.default.svc:443
            - source_labels: [__meta_kubernetes_node_name]
              regex: (.+)
              target_label: __metrics_path__
              replacement: /api/v1/nodes/${1}/proxy/metrics
          scheme: https
          tls_config:
            insecure_skip_verify: true
          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

        - job_name: 'kubernetes-pods'
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_scrape]
              action: keep
              regex: true
            - source_labels: [__meta_kubernetes_pod_annotation_prometheus_io_path]
              action: replace
              target_label: __metrics_path__
              regex: (.+)
            - source_labels: [__address__, __meta_kubernetes_pod_annotation_prometheus_io_port]
              action: replace
              regex: ([^:]+)(?::\d+)?;(\d+)
              replacement: $1:$2
              target_label: __address__
            - action: labelmap
              regex: __meta_kubernetes_pod_label_(.+)
            - source_labels: [__meta_kubernetes_namespace]
              action: replace
              target_label: kubernetes_namespace
            - source_labels: [__meta_kubernetes_pod_name]
              action: replace
              target_label: kubernetes_pod_name

        - job_name: 'kubernetes-cadvisor'
          kubernetes_sd_configs:
            - role: node
          relabel_configs:
            - action: labelmap
              regex: __meta_kubernetes_node_label_(.+)
            - target_label: __address__
              replacement: kubernetes.default.svc:443
            - source_labels: [__meta_kubernetes_node_name]
              regex: (.+)
              target_label: __metrics_path__
              replacement: /api/v1/nodes/${1}/proxy/metrics/cadvisor
          scheme: https
          tls_config:
            insecure_skip_verify: true
          bearer_token_file: /var/run/secrets/kubernetes.io/serviceaccount/token

        # Add scraping configurations for your microservices here
        # Example for a microservice (replace service-name and port)
        - job_name: 'user-service'
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: user-service
            - source_labels: [__address__]
              action: replace
              regex: (.+)
              target_label: __address__
              replacement: $1:3002 # Replace with the actual port of user-service

        - job_name: 'auth-service'
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: auth-service
            - source_labels: [__address__]
              action: replace
              regex: (.+)
              target_label: __address__
              replacement: $1:3001 # Replace with the actual port of auth-service

        - job_name: 'activity-service'
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: activity-service
            - source_labels: [__address__]
              action: replace
              regex: (.+)
              target_label: __address__
              replacement: $1:3003 # Replace with the actual port of activity-service

        - job_name: 'classroom-service'
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: classroom-service
            - source_labels: [__address__]
              action: replace
              regex: (.+)
              target_label: __address__
              replacement: $1:3006 # Replace with the actual port of classroom-service

        - job_name: 'parent-service'
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: parent-service
            - source_labels: [__address__]
              action: replace
              regex: (.+)
              target_label: __address__
              replacement: $1:3004 # Replace with the actual port of parent-service

        - job_name: 'student-service'
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: student-service
            - source_labels: [__address__]
              action: replace
              regex: (.+)
              target_label: __address__
              replacement: $1:3005 # Replace with the actual port of student-service

        - job_name: 'teacher-service'
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: teacher-service
            - source_labels: [__address__]
              action: replace
              regex: (.+)
              target_label: __address__
              replacement: $1:3007 # Replace with the actual port of teacher-service

        - job_name: 'gateway-backend'
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: gateway-backend
            - source_labels: [__address__]
              action: replace
              regex: (.+)
              target_label: __address__
              replacement: $1:3000 # Replace with the actual port of gateway-backend

        - job_name: 'frontend-app'
          kubernetes_sd_configs:
            - role: pod
          relabel_configs:
            - source_labels: [__meta_kubernetes_pod_label_app]
              action: keep
              regex: frontend-app
            - source_labels: [__address__]
              action: replace
              regex: (.+)
              target_label: __address__
              replacement: $1:4200 # Replace with the actual port of frontend-app
