apiVersion: batch/v1
kind: Job
metadata:
  name: fix-parent-schema-columns
  namespace: education
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: default
      containers:
      - name: migrate
        image: postgres:15-alpine
        env:
        - name: PGPASSWORD
          value: password123
        command:
        - /bin/sh
        - -c
        - |
          psql -h postgres -U education -d education_db -c "
          ALTER TABLE parent ADD COLUMN IF NOT EXISTS firstName VARCHAR(100);
          ALTER TABLE parent ADD COLUMN IF NOT EXISTS lastName VARCHAR(100);
          ALTER TABLE parent ADD COLUMN IF NOT EXISTS email VARCHAR(255) UNIQUE;
          ALTER TABLE parent DROP COLUMN IF EXISTS userId;
          "
      restartPolicy: Never
