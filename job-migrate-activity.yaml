apiVersion: batch/v1
kind: Job
metadata:
  name: migrate-activity-schema
  namespace: education
spec:
  backoffLimit: 1
  template:
    spec:
      serviceAccountName: default
      containers:
      - name: migrate
        image: postgres:15-alpine
        env:
        - name: PGPASSWORD
          value: password123
        command:
        - /bin/sh
        - -c
        - |
          psql -h postgres -U education -d education_db -c "
          CREATE TABLE IF NOT EXISTS activity (
            id SERIAL PRIMARY KEY,
            name VARCHAR(255) NOT NULL,
            type VARCHAR(100),
            description TEXT,
            location VARCHAR(255),
            date TIMESTAMP NOT NULL,
            duration INTEGER NOT NULL,
            isCompleted BOOLEAN DEFAULT FALSE,
            classroomId INTEGER,
            metadata JSONB,
            createdAt TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            updatedAt TIMESTAMP DEFAULT CURRENT_TIMESTAMP,
            CONSTRAINT fk_activity_classroom FOREIGN KEY (classroomId) REFERENCES classroom(id) ON DELETE SET NULL
          );
          CREATE INDEX IF NOT EXISTS idx_activity_classroomId ON activity(classroomId);"
      restartPolicy: Never
