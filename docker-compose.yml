version: '3.8'

services:
  # PostgreSQL Database
  postgres:
    image: postgres:15-alpine
    container_name: education-postgres
    environment:
      POSTGRES_USER: education
      POSTGRES_PASSWORD: education
      POSTGRES_DB: education_db
    volumes:
      - postgres_data:/var/lib/postgresql/data
    ports:
      - "5432:5432"
    networks:
      - education

  # Redis Cache
  redis:
    image: redis:7-alpine
    container_name: education-redis
    ports:
      - "6379:6379"
    networks:
      - education

  # RabbitMQ Message Queue
  rabbitmq:
    image: rabbitmq:3-management-alpine
    container_name: education-rabbitmq
    environment:
      RABBITMQ_DEFAULT_USER: admin
      RABBITMQ_DEFAULT_PASS: admin
    ports:
      - "5672:5672"
      - "15672:15672"
    networks:
      - education

  # API Gateway
  gateway:
    build:
      context: ./backend/gateway
      dockerfile: Dockerfile
    container_name: education-gateway
    environment:
      NODE_ENV: development
      PORT: 3000
      DB_HOST: postgres
      DB_PORT: 5432
      DB_USERNAME: education
      DB_PASSWORD: education
      DB_NAME: education_db
    ports:
      - "3000:3000"
    depends_on:
      - postgres
    networks:
      - education

  # Frontend
  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile.prod
    container_name: education-frontend
    ports:
      - "80:80"
    depends_on:
      - gateway
    networks:
      - education

volumes:
  postgres_data:

networks:
  education:
    driver: bridge
